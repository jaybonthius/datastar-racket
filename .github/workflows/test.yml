name: Test

on:
  push:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  datastar-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Racket
        uses: Bogdanp/setup-racket@v1.15
        with:
          architecture: 'x64'
          distribution: 'full'
          version: '9.1'
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Install Package and Dependencies
        run: raco pkg install --auto --batch datastar/
      - name: Run Unit Tests
        run: raco test datastar/tests/unit-tests.rkt
      - name: Run Integration Tests
        run: raco test datastar/tests/integration-tests.rkt
      - name: Run SDK Tests
        run: raco test datastar/tests/sdk-tests/

  brotli-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Racket
        uses: Bogdanp/setup-racket@v1.15
        with:
          architecture: 'x64'
          distribution: 'full'
          version: '9.1'
      - name: Install Datastar
        run: raco pkg install --auto --batch datastar/
      - name: Install libbrotli native libraries
        run: raco pkg install --batch --name libbrotli-x86_64-linux https://github.com/jaybonthius/racket-libbrotli/releases/download/v1.0.0-beta.2/libbrotli-x86_64-linux-1.1.0.tar.gz
      - name: Install libbrotli bindings
        run: raco pkg install --batch --name libbrotli https://github.com/jaybonthius/racket-libbrotli.git?path=libbrotli
      - name: Install datastar-brotli
        run: raco pkg install --auto --batch datastar-brotli/
      - name: Run Brotli Tests
        run: raco test datastar-brotli/tests/brotli-tests.rkt
