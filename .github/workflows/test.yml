name: Test

on:
  push:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  datastar-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Racket
        uses: Bogdanp/setup-racket@v1.15
        with:
          architecture: 'x64'
          distribution: 'full'
          version: '9.1'
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Install Package and Dependencies
        run: raco pkg install --auto --batch datastar/
      - name: Run Unit Tests
        run: raco test datastar/tests/unit-tests.rkt
      - name: Run Integration Tests
        run: raco test datastar/tests/integration-tests.rkt
      - name: Run SDK Tests
        run: raco test datastar/tests/sdk-tests/

  brotli-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Racket
        uses: Bogdanp/setup-racket@v1.15
        with:
          architecture: 'x64'
          distribution: 'full'
          version: '9.1'
      - name: Install Package and Dependencies
        run: raco pkg install --auto --batch datastar/ datastar-brotli/
      - name: Run Brotli Tests
        run: raco test datastar-brotli/tests/brotli-tests.rkt
